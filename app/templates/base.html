<!DOCTYPE html>
<html lang="fr" class="">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}KlickBase{% endblock %}</title>

  <!-- Theme init: runs before render to avoid flash -->
  <script>
    (function () {
      const cookie = document.cookie.split('; ').find(r => r.startsWith('kb_theme='));
      const saved = cookie ? cookie.split('=')[1] : null;
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { brand: '#2563eb' } } }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
  <script src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js" defer></script>

  <style>
    [x-cloak] { display: none !important; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request.htmx-indicator { display: inline-block; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-800 dark:text-gray-100 min-h-screen transition-colors duration-200"
      x-data
      x-init="
        Alpine.store('theme', {
          isDark: document.documentElement.classList.contains('dark'),
          toggle() {
            this.isDark = !this.isDark;
            if (this.isDark) {
              document.documentElement.classList.add('dark');
              document.cookie = 'kb_theme=dark; path=/; max-age=31536000; SameSite=Lax';
            } else {
              document.documentElement.classList.remove('dark');
              document.cookie = 'kb_theme=light; path=/; max-age=31536000; SameSite=Lax';
            }
          }
        });
      ">

  <!-- Header -->
  <header class="bg-blue-600 dark:bg-blue-800 text-white shadow-md sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <a href="/" class="flex items-center gap-2 text-xl font-bold tracking-tight shrink-0">
        <span class="text-2xl">🧩</span>
        <span>KlickBase</span>
      </a>

      <div class="flex items-center gap-2">
        <!-- Theme toggle -->
        <button @click="$store.theme.toggle()"
                :title="$store.theme.isDark ? 'Mode clair' : 'Mode sombre'"
                class="w-9 h-9 flex items-center justify-center rounded-lg bg-blue-500 dark:bg-blue-700 hover:bg-blue-400 dark:hover:bg-blue-600 transition text-lg">
          <span x-show="$store.theme.isDark">☀️</span>
          <span x-show="!$store.theme.isDark">🌙</span>
        </button>

        <a href="/sets/new"
           class="bg-white dark:bg-gray-100 text-blue-600 px-4 py-1.5 rounded-lg font-semibold text-sm hover:bg-blue-50 transition shrink-0">
          + Ajouter un set
        </a>
      </div>
    </div>
  </header>

  <!-- Toast / flash -->
  {% if scrape_message is defined %}
  <div x-data="{ show: true }" x-show="show" x-cloak
       class="fixed top-16 right-4 z-50 max-w-sm px-4 py-3 rounded-lg shadow-lg text-sm font-medium
              {{ 'bg-emerald-100 dark:bg-emerald-900 text-emerald-800 dark:text-emerald-100 border border-emerald-300 dark:border-emerald-700' if scrape_ok else 'bg-amber-100 dark:bg-amber-900 text-amber-800 dark:text-amber-100 border border-amber-300 dark:border-amber-700' }}"
       x-init="setTimeout(() => show = false, 4000)">
    {{ scrape_message }}
  </div>
  {% endif %}

  <main class="max-w-7xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
